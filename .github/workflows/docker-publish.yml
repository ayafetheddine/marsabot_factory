# ──────────────────────────────────────────────────────────────────────────────
# CI/CD — MarsaBot Factory
# Déclenché sur chaque push vers la branche main.
# Construit et publie les images Docker du backend et du frontend sur Docker Hub.
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:

  # ── 1. Build & Push Backend ────────────────────────────────────────────────
  build-backend:
    name: Backend — Build & Push
    runs-on: ubuntu-latest

    steps:
      # Récupérer le code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # Se connecter à Docker Hub avec les secrets GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Activer BuildKit pour des builds plus rapides (cache, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construire et pousser l'image backend
      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/marsabot-backend:latest
          # Cache entre les runs pour accélérer les builds suivants
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Build & Push Frontend ───────────────────────────────────────────────
  build-frontend:
    name: Frontend — Build & Push
    runs-on: ubuntu-latest

    steps:
      # Récupérer le code source
      - name: Checkout repository
        uses: actions/checkout@v4

      # Se connecter à Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Activer BuildKit
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construire et pousser l'image frontend (multi-stage : Vite → Nginx)
      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/marsabot-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
